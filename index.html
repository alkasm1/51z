<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>النظام الترددي اللغوي + تمثيل الأعداد الضخمة</title>

  <style>
    body {
      font-family: "Cairo", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      background: #161b22;
      border-radius: 14px;
      padding: 28px;
      border: 1px solid #30363d;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      color: #58a6ff;
      margin-bottom: 20px;
      font-size: 2rem;
    }

    h2 {
      color: #79c0ff;
      margin-bottom: 10px;
    }

    label {
      margin-top: 10px;
      display: block;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #e6edf3;
      font-size: 1rem;
      height: 120px;
      resize: vertical;
    }

    button {
      margin-top: 12px;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      background: #238636;
      color: white;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover { background: #2ea043; }

    .copy-btn {
      background: #4ade80;
      color: #0d1117;
    }
    .copy-btn:hover { background: #22c55e; }

    .output {
      margin-top: 10px;
      padding: 12px;
      background: #0d1117;
      border: 1px dashed #30363d;
      border-radius: 8px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: #6e7681;
      font-size: 0.9rem;
    }

    .row { display: grid; grid-template-columns: 1fr; gap: 16px; }
    @media (min-width: 860px) { .row { grid-template-columns: 1fr 1fr; } }

    textarea.mono {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>النظام الترددي اللغوي + تمثيل الأعداد الضخمة</h1>

    <!-- ========================= -->
    <!-- 1) جملة ↔ تردد -->
    <!-- ========================= -->
    <div class="row">
      <div class="card">
        <h2>تحويل جملة إلى ترددات</h2>
        <label>أدخل نصًا عربيًا:</label>
        <textarea id="sentenceInput" placeholder="ألصق هنا أي نص..."></textarea>
        <button onclick="encodeSentence()">تحويل</button>
        <button class="copy-btn" onclick="copyAllFreqs()">نسخ الترددات</button>
        <div class="output" id="encodeOutput">—</div>
      </div>

      <div class="card">
        <h2>تحويل ترددات إلى جملة</h2>
        <label>أدخل الترددات (كل تردد في سطر):</label>
        <textarea id="freqListInput" class="mono"></textarea>
        <button onclick="decodeFreqList()">تحويل</button>
        <div class="output" id="decodeOutput">—</div>
      </div>
    </div>

    <!-- ========================= -->
    <!-- 2) BigInt ↔ Word -->
    <!-- ========================= -->
    <div class="row" style="margin-top:24px;">
      <div class="card">
        <h2>عدد ضخم → كلمة</h2>
        <label>أدخل عددًا عشريًا ضخمًا:</label>
        <textarea id="bigIntInput" class="mono" placeholder="12345678901234567890..."></textarea>
        <button onclick="encodeBigIntToWord()">تحويل</button>
        <div class="output" id="bigIntToWordOutput">—</div>
      </div>

      <div class="card">
        <h2>كلمة → عدد ضخم</h2>
        <label>أدخل كلمة:</label>
        <textarea id="wordInput" class="mono" placeholder="مثال: بمهدق"></textarea>
        <button onclick="decodeWordToBigInt()">تحويل</button>
        <div class="output" id="wordToBigIntOutput">—</div>
      </div>
    </div>

    <div class="footer">
      م: رأفت عمر— نسخة موسّعة: ترددات + نظام أعداد لغوي
    </div>
  </div>

<script>
  /* ================================
     إعدادات النظام الترددي
  ==================================*/
  const B = 32;
  const LMAX = 12;
  let f0 = 100000;
  let df = 1;

  /* ================================
     تطبيع عربي
  ==================================*/
  function normalizeArabic(s) {
    return (s || "")
      .replace(/[إأآ]/g, "ا")
      .replace(/ى/g, "ي")
      .replace(/ؤ/g, "و")
      .replace(/ئ/g, "ي")
      .replace(/ة/g, "ه");
  }

  /* ================================
     جدول الحروف (28 حرفًا)
  ==================================*/
  const indexToChar = {
    1:"ا",2:"ب",3:"ت",4:"ث",5:"ج",6:"ح",7:"خ",
    8:"د",9:"ذ",10:"ر",11:"ز",12:"س",13:"ش",14:"ص",
    15:"ض",16:"ط",17:"ظ",18:"ع",19:"غ",20:"ف",21:"ق",
    22:"ك",23:"ل",24:"م",25:"ن",26:"ه",27:"و",28:"ي"
  };

  const charToIndex = {};
  for (const [i,ch] of Object.entries(indexToChar)) {
    charToIndex[ch] = parseInt(i, 10);
  }

  const BASE_L = Object.keys(indexToChar).length;

  function normalizeWord(word) {
    let w = normalizeArabic(word || "").trim();
    let out = "";
    for (const ch of w) {
      if (charToIndex[ch] !== undefined) out += ch;
    }
    return out;
  }

  /* ================================
     جملة → كلمات
  ==================================*/
  function splitToWords(sentence) {
    const s = normalizeArabic(sentence || "").replace(/\s+/g, " ").trim();
    if (!s) return [];
    return s.split(" ").map(x => x.trim()).filter(Boolean);
  }

  /* ================================
     FNV-1a Hash
  ==================================*/
  function fnv1aHash(str) {
    let hash = 0x811c9dc5;
    for (let i = 0; i < str.length; i++) {
      hash ^= str.charCodeAt(i);
      hash = Math.imul(hash, 0x01000193);
    }
    return hash >>> 0;
  }

  const freqToWordMap = new Map();
  window.lastFreqList = null;

  /* ================================
     جملة → ترددات
  ==================================*/
  function encodeSentence() {
    const sentence = document.getElementById("sentenceInput").value || "";
    const words = splitToWords(sentence);

    const domainSize = (BigInt(B) ** BigInt(LMAX));
    const allFreqs = [];
    const decodedPreviewWords = [];

    for (const w of words) {
      const normalized = normalizeWord(w);
      if (!normalized) continue;

      const hash = fnv1aHash(normalized);
      const k = BigInt(hash) % domainSize;
      const f = f0 + Number(k) * df;

      freqToWordMap.set(String(f), normalized);

      allFreqs.push(String(f));
      decodedPreviewWords.push(normalized);
    }

    const html = `
      <p>عدد الكلمات: ${decodedPreviewWords.length}</p>
      <textarea class="mono" style="width:100%;height:250px;">${allFreqs.join("\n")}</textarea>
    `;

    document.getElementById("encodeOutput").innerHTML = html;
    window.lastFreqList = allFreqs;
  }

  function copyAllFreqs() {
    if (!window.lastFreqList) return;
    navigator.clipboard.writeText(window.lastFreqList.join("\n"));
  }

  /* ================================
     ترددات → جملة
  ==================================*/
  function decodeFreqList() {
    const input = document.getElementById("freqListInput").value || "";
    const lines = input.split(/\n+/);

    const decodedWords = [];

    for (const line of lines) {
      const t = line.trim();
      if (!t) continue;

      const w = freqToWordMap.get(String(t));
      decodedWords.push(w ? w : "—");
    }

    document.getElementById("decodeOutput").textContent = decodedWords.join(" ");
  }

  /* ================================
     BigInt → Word
  ==================================*/
  function bigIntToWord(decimalStr) {
    let n = BigInt(decimalStr.trim());
    if (n === 0n) return indexToChar[1];

    let chars = [];
    while (n > 0n) {
      const r = n % BigInt(BASE_L);
      n = n / BigInt(BASE_L);
      const idx = Number(r) + 1;
      chars.push(indexToChar[idx]);
    }
    return chars.reverse().join("");
  }

  /* ================================
     Word → BigInt
  ==================================*/
  function wordToBigInt(word) {
    const w = normalizeWord(word || "");
    let n = 0n;
    for (const ch of w) {
      const idx = charToIndex[ch];
      n = n * BigInt(BASE_L) + BigInt(idx - 1);
    }
    return n.toString();
  }

  function encodeBigIntToWord() {
    const input = document.getElementById("bigIntInput").value.trim();
    if (!input) {
      document.getElementById("bigIntToWordOutput").textContent = "أدخل عددًا.";
      return;
    }
    try {
      const word = bigIntToWord(input);
      document.getElementById("bigIntToWordOutput").textContent = word;
    } catch {
      document.getElementById("bigIntToWordOutput").textContent = "عدد غير صالح.";
    }
  }

  function decodeWordToBigInt() {
    const word = document.getElementById("wordInput").value.trim();
    if (!word) {
      document.getElementById("wordToBigIntOutput").textContent = "أدخل كلمة.";
      return;
    }
    try {
      const nStr = wordToBigInt(word);
      document.getElementById("wordToBigIntOutput").textContent = nStr;
    } catch {
      document.getElementById("wordToBigIntOutput").textContent = "كلمة غير صالحة.";
    }
  }
</script>

</body>
</html>
